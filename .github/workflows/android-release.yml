name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag del release (ej: v1.0.0). Si se omite, se genera uno.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Resolve tag
        id: resolve_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG_NAME="${{ inputs.tag }}"
          else
            TAG_NAME="v$(date +'%Y.%m.%d-%H%M')"
          fi
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "Usando tag: ${TAG_NAME}"

      - name: Create and push tag (manual run only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG_NAME="${{ steps.resolve_tag.outputs.tag }}"
          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} ya existe"
          else
            git tag "${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi

      - name: Validate signing secrets
        shell: bash
        run: |
          missing=0
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEY_ALIAS ANDROID_STORE_PASSWORD ANDROID_KEY_PASSWORD; do
            if [[ -z "${!key}" ]]; then
              echo "Falta secret: ${key}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Configura los secrets del repo para firmar releases."
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Decode release keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release-key.jks"

      - name: Build signed release APK
        shell: bash
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release-key.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: Release ${{ steps.resolve_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
